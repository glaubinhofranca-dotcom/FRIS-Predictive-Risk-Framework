name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so HF receives all commits

      - name: Remove binary files from history (HF rejects PNGs via git)
        run: |
          pip install git-filter-repo --quiet
          git filter-repo \
            --path fris_model_results.png \
            --path fris_segmentation.png \
            --invert-paths \
            --force

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://GlauberFR:${HF_TOKEN}@huggingface.co/spaces/GlauberFR/FRIS-v3
          git push hf main --force
